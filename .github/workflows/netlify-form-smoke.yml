name: Netlify Form Smoke

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: netlify-form-smoke-${{ github.ref }}
  cancel-in-progress: false

jobs:
  form-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SITE_URL: ${{ vars.NETLIFY_SITE_URL || secrets.NETLIFY_SITE_URL || 'https://holycityepoxy.com' }}
      THROTTLE_SECONDS: '8'
      OUTPUT_DIR: ci-artifacts/form-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Netlify form smoke checks
        run: ./scripts/smoke-test-netlify-forms.sh

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: netlify-form-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          path: ci-artifacts/form-smoke/
          if-no-files-found: error
